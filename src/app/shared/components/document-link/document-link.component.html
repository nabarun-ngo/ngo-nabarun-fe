<div class="documents-page">
  <mat-accordion class="category-accordion" multi="true">
    <mat-expansion-panel *ngFor="let category of categories" [expanded]="category.isExpanded ?? expandedByDefault"
      (opened)="onCategoryOpen(category)" class="category-panel">
      <mat-expansion-panel-header>
        <mat-panel-title class="category-title" style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
          <span>{{ category.name }}</span>
          <a *ngIf="category.actionName" [routerLink]="category.actionLink" [queryParams]="category.actionQueryParams" mat-button color="primary" (click)="$event.stopPropagation()">
            {{ category.actionName }}
          </a>
        </mat-panel-title>
      </mat-expansion-panel-header>

      <ng-template matExpansionPanelContent>
        <p *ngIf="category.description" class="category-description">
          {{ category.description }}
        </p>
        <div *ngIf="category.isLoading" class="loading-container">
          <mat-progress-spinner mode="indeterminate" diameter="40"></mat-progress-spinner>
        </div>

        <div *ngIf="!category.isLoading">
          <ul class="documents-list">
            <li *ngFor="let doc of category.documents" class="document-item">
              <a href="javascript:void(0)" (click)="onDocumentClick(doc, category.name)" class="document-link"
                [title]="'Open ' + (doc.description || '')">
                {{ doc.description || doc.key }}
              </a>
              <ng-container *ngIf="hasKebab">
                <button mat-icon-button class="kebab-btn"
                  [matMenuTriggerFor]="docMenu"
                  [matMenuTriggerData]="{ doc: doc, categoryName: category.name }"
                  (click)="$event.stopPropagation()"
                  aria-label="More options">
                  <mat-icon>more_vert</mat-icon>
                </button>
              </ng-container>
            </li>
          </ul>

          <!-- Single shared menu definition — data injected via matMenuTriggerData -->
          <mat-menu #docMenu="matMenu" class="doc-kebab-menu">
            <ng-template matMenuContent let-doc="doc" let-categoryName="categoryName">
              <button mat-menu-item *ngFor="let item of kebabMenuItems"
                (click)="onKebabItemClick(item, doc, categoryName, $event)">
                {{ item.name }}
              </button>
            </ng-template>
          </mat-menu>

          <div *ngIf="(category.totalElements || category.documents.length) > pageSize" class="pagination-controls">
            <button mat-icon-button [disabled]="(currentPageMap[category.name] || 0) === 0"
              (click)="onPageChange(category, (currentPageMap[category.name] || 0) - 1)">
              <mat-icon>chevron_left</mat-icon>
            </button>
            <span class="page-info">
              {{ (currentPageMap[category.name] || 0) + 1 }} of {{ getTotalPages(category) }}
            </span>
            <button mat-icon-button [disabled]="(currentPageMap[category.name] || 0) >= getTotalPages(category) - 1"
              (click)="onPageChange(category, (currentPageMap[category.name] || 0) + 1)">
              <mat-icon>chevron_right</mat-icon>
            </button>
          </div>
        </div>
      </ng-template>
    </mat-expansion-panel>
  </mat-accordion>
</div>
