<div class="relative group overflow-hidden rounded-2xl">
    <!-- Slides Content -->
    <div class="relative w-full overflow-hidden">
        <div class="transition-all duration-500 ease-in-out transform pb-10" *ngIf="items.length > 0">
            <ng-container
                *ngTemplateOutlet="templateRef; context: { $implicit: items[currentIndex], index: currentIndex }">
            </ng-container>
        </div>
    </div>

    <!-- Navigation Controls -->
    <ng-container *ngIf="items.length > 1 && showControls">
        <!-- Previous Button -->
        <button (click)="previous()"
            class="absolute left-2 top-1/2 -translate-y-1/2 p-2 rounded-full bg-black/5 backdrop-blur-sm border border-black/10 text-gray-800 shadow-sm opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-black/10 focus:outline-none focus:ring-2 focus:ring-purple-500/50 z-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>

        <!-- Next Button -->
        <button (click)="next()"
            class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full bg-black/5 backdrop-blur-sm border border-black/10 text-gray-800 shadow-sm opacity-0 group-hover:opacity-100 transition-all duration-300 hover:bg-black/10 focus:outline-none focus:ring-2 focus:ring-purple-500/50 z-10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>

        <!-- Pagination Dots -->
        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 flex space-x-1.5 z-10">
            <button *ngFor="let item of items; let i = index" (click)="goTo(i)"
                class="w-1.5 h-1.5 rounded-full transition-all duration-300 focus:outline-none"
                [ngClass]="i === currentIndex ? 'bg-purple-600 w-3' : 'bg-gray-300 hover:bg-gray-400'">
            </button>
        </div>
    </ng-container>
</div>
