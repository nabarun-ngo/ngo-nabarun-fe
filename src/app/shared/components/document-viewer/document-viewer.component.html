<div class="flex flex-col h-full w-full bg-white overflow-hidden">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100 bg-white sticky top-0 z-10">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-50 rounded-lg">
                <mat-icon class="text-indigo-600">description</mat-icon>
            </div>
            <div>
                <h2 class="text-lg font-semibold text-gray-900 leading-tight">{{ data.title }}</h2>
                <p class="text-xs text-gray-500 font-medium uppercase tracking-wider">Document Viewer</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button mat-icon-button (click)="openInNewTab()" matTooltip="Open in new tab" class="text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all duration-200">
                <mat-icon>open_in_new</mat-icon>
            </button>
            <button mat-icon-button (click)="close()" class="text-gray-400 hover:text-red-600 hover:bg-red-50 transition-all duration-200">
                <mat-icon>close</mat-icon>
            </button>
        </div>
    </div>

    <!-- Content -->
    <div class="flex-grow relative bg-gray-50">
        <iframe 
            [src]="data.url | safeResourceUrl" 
            (load)="onIframeLoad()"
            class="absolute inset-0 w-full h-full border-none shadow-inner"
            [class.opacity-0]="isLoading"
            allow="autoplay; encrypted-media" 
            allowfullscreen>
        </iframe>
        
        <!-- Loading overlay -->
        <div *ngIf="isLoading" class="absolute inset-0 flex items-center justify-center bg-gray-50 z-20">
             <div class="flex flex-col items-center gap-4">
                 <mat-spinner diameter="48" strokeWidth="4"></mat-spinner>
                 <p class="text-sm font-medium text-gray-500 animate-pulse">Loading Document...</p>
             </div>
        </div>
    </div>
</div>
