<section class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 px-4 py-12">
    <div class="fixed inset-0 z-0 overflow-hidden">
        <div class="absolute inset-0 bg-gray-400 dark:bg-gray-900 opacity-50 backdrop-blur-sm"></div>
    </div>

    <div class="relative z-10 w-full max-w-[380px]">
        <div class="bg-white dark:bg-gray-800 rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-6 sm:p-10">
                <div class="flex flex-col items-center mb-2">
                    <img src="/assets/logo.png" loading="lazy" class="w-32 h-auto mb-2" alt="Nabarun Logo">
                    <h1 class="text-2xl font-bold text-gray-900 dark:text-white text-center">Welcome to Nabarun</h1>
                </div>

                <div class="space-y-4 mb-8">
                    <div *ngIf="!isCodeError && !isAuthenticated"
                        class="p-4 text-sm font-medium text-blue-800 rounded-2xl bg-blue-50 dark:bg-gray-900/50 dark:text-blue-400 border border-blue-100 dark:border-blue-900/50"
                        role="alert">
                        You must be logged in to access the digital portal of Nabarun.
                    </div>
                    <div *ngIf="isCodeError"
                        class="p-4 text-sm font-medium text-red-800 rounded-2xl bg-red-50 dark:bg-gray-900/50 dark:text-red-400 border border-red-100 dark:border-red-900/50"
                        role="alert" [innerHtml]="(codeErrorDescription | htmlSanitizer)">
                    </div>
                </div>

                <div *ngIf="!isAuthenticated" class="grid gap-4 mb-8">
                    <button id="otp" (click)="loginWithoutPassword()"
                        class="w-full h-12 px-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl flex items-center justify-center transition-all duration-300 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 group">
                        <span
                            class="font-bold text-gray-700 dark:text-gray-200 group-hover:text-blue-600 dark:group-hover:text-blue-400">Login
                            with OTP</span>
                    </button>
                    <button id="password" (click)="loginWithPassword()"
                        class="w-full h-12 px-6 border-2 border-gray-200 dark:border-gray-700 rounded-2xl flex items-center justify-center transition-all duration-300 hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/20 group">
                        <span
                            class="font-bold text-gray-700 dark:text-gray-200 group-hover:text-blue-600 dark:group-hover:text-blue-400">Login
                            with Password</span>
                    </button>
                </div>

                <div class="flex flex-col items-center gap-4 py-2">
                    <div class="flex flex-wrap justify-center gap-3">
                        <div class="flex items-center gap-2">
                            <span class="text-xs text-gray-500 dark:text-gray-400">Experience NABARUN at your
                                fingertips</span>
                        </div>
                        <!-- PWA Install Button -->
                        <button (click)="installPWA()" *ngIf="showInstallButton"
                            class="flex items-center gap-2 px-6 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-all duration-300 shadow-lg shadow-blue-900/20">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            <span class="text-sm font-bold tracking-wide">Install App</span>
                        </button>
                    </div>
                </div>

                <div class="mt-4 text-center">
                    <p class="text-xs text-gray-500 dark:text-gray-400">
                        By proceeding, you agree to our
                        <a href="/privacy-policy/"
                            class="text-blue-600 dark:text-blue-400 hover:underline font-medium">Privacy Policy</a>
                    </p>
                </div>
                <div class=" text-center pointer-events-none">
                    <span class="text-[10px] text-gray-400 dark:text-gray-600 uppercase tracking-widest">{{env}}</span>
                </div>
            </div>
        </div>
    </div>

</section>
