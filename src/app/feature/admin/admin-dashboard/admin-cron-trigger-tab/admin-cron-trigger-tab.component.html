<div class="mb-4 flex flex-wrap justify-end gap-2 relative z-10">
    <button mat-button color="secondary" (click)="loadData()">
        <mat-icon>refresh</mat-icon>
        Refresh
    </button>
</div>
<mat-accordion *ngIf="jobList.length > 0">
    <mat-expansion-panel [expanded]="true">
        <mat-expansion-panel-header>
            <mat-panel-title class="font-bold text-center text-xl">
                <div class="w-full text-center text-indigo-500 text-xl font-bold">Scheduled Cron Jobs</div>
            </mat-panel-title>
        </mat-expansion-panel-header>

        <div class="mt-4 px-2">
            <!-- Header for larger screens -->
            <div
                class="hidden md:grid grid-cols-12 gap-4 px-4 py-3 bg-gray-50 rounded-t-lg border-x border-t border-gray-200 text-xs font-bold text-gray-500 uppercase tracking-wider">
                <div class="col-span-3">Job Details</div>
                <div class="col-span-5">Purpose</div>
                <div class="col-span-3 text-center">Next Run</div>
                <div class="col-span-1 text-center">Action</div>
            </div>

            <div class="border border-gray-100 rounded-b-lg shadow-sm bg-white divide-y divide-gray-50">
                <div *ngFor="let data of jobList"
                    class="grid grid-cols-1 md:grid-cols-12 gap-4 px-4 py-4 items-center hover:bg-indigo-50/20 transition-all duration-200">

                    <!-- Job Name & Handler -->
                    <div class="col-span-1 md:col-span-3 flex flex-col gap-1">
                        <div class="flex items-center flex-wrap gap-2">
                            <span class="font-bold text-gray-800 tracking-tight">{{data.name}}</span>
                            <span
                                [class]="data.enabled ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'"
                                class="text-[10px] px-2 py-0.5 rounded-full font-bold uppercase border">
                                {{data.enabled ? 'Active' : 'Paused'}}
                            </span>
                        </div>
                        <span
                            class="text-[10px] text-gray-400 font-mono italic truncate max-w-full"
                            [matTooltip]="data.handler">
                            {{data.handler}}
                        </span>
                    </div>

                    <!-- Description -->
                    <div class="col-span-1 md:col-span-5 text-sm text-gray-600 line-clamp-2" [matTooltip]="data.description">
                        {{data.description}}
                    </div>

                    <!-- Next Run (Simplified) -->
                    <div class="col-span-1 md:col-span-3 text-center">
                        <div class="text-sm font-semibold text-gray-700">{{data.nextRun | date: 'dd MMM, yyyy'}}</div>
                        <div class="text-[11px] text-gray-400 font-medium">{{data.nextRun | date: 'HH:mm:ss'}}</div>
                    </div>

                    <!-- Actions (Simplified) -->
                    <div class="col-span-1 md:col-span-1 flex justify-center">
                        <button mat-icon-button color="primary" matTooltip="Run Job" (click)="triggerDirectly(data.name)">
                            <mat-icon>play_circle_filled</mat-icon>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Empty state if jobList is empty (though *ngIf handles it) -->
            <div *ngIf="jobList.length === 0" class="py-12 text-center text-gray-400">
                <mat-icon class="text-4xl opacity-20">history_toggle_off</mat-icon>
                <p>No scheduled jobs found.</p>
            </div>
        </div>
    </mat-expansion-panel>
</mat-accordion>
<div class="mt-8 mb-4 flex items-center gap-3 justify-center">
    <div class="h-px flex-1 bg-gradient-to-r from-transparent to-indigo-100"></div>
    <h2 class="text-2xl font-extrabold text-indigo-600 tracking-tight flex items-center gap-2">
        <mat-icon>history</mat-icon>
        Cron Execution History
    </h2>
    <div class="h-px flex-1 bg-gradient-to-l from-transparent to-indigo-100"></div>
</div>
<app-accordion-list [accordionList]="getAccordionList()" (onButtonClick)="onClick($event)"
    (onAccordionOpen)="onAccordionOpen($event)"></app-accordion-list>
<mat-paginator class="mt-4" style="background-color: transparent;" (page)="handlePageEvent($event)"
    [length]="itemLength$ | async" [pageSize]="pageSize" [pageSizeOptions]="pageSizeOptions" [pageIndex]="pageNumber"
    aria-label="Select page">
</mat-paginator>
