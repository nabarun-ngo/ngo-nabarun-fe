<app-accordion-list [accordionList]="accordionList" (onButtonClick)="onClick($event)">
</app-accordion-list>

<mat-paginator class="my-4" style="background-color: transparent;" (page)="handlePageEvent($event)"
    [length]="itemList.length" [pageSize]="paginationConfig.pageSize"
    [pageSizeOptions]="paginationConfig.pageSizeOptions" [pageIndex]="pageEvent?.pageIndex ?? paginationConfig.pageNumber"
    aria-label="Select page">
</mat-paginator>
