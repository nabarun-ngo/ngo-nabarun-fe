<main class="p-2 sm:p-4 m-2 sm:m-4 bg-gray-200 rounded-lg">
    <mat-accordion>
        <mat-expansion-panel>
            <mat-expansion-panel-header class="!h-20 sm:!h-16">
                <mat-panel-title class="flex items-center justify-center w-full">
                    <div class="flex items-center gap-2 sm:gap-3 text-primary-600">
                        <mat-icon class="!text-2xl !h-6 !w-6">link</mat-icon>
                        <span class="text-lg sm:text-xl font-bold tracking-tight">Quick Resources & Links</span>
                    </div>
                </mat-panel-title>
            </mat-expansion-panel-header>

            <div class="max-h-80 overflow-y-auto custom-scrollbar p-2 sm:p-6 bg-gray-50/50 rounded-b-lg">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" *ngIf="appLinks.length > 0">
                    <a *ngFor="let data of appLinks" [href]="data.displayValue" target="_blank"
                        class="group relative flex flex-col p-4 bg-white rounded-xl border border-gray-200 shadow-sm hover:shadow-lg hover:border-primary-300 hover:-translate-y-1 transition-all duration-300 no-underline overflow-hidden">

                        <!-- Accent Bar -->
                        <div
                            class="absolute top-0 left-0 w-1.5 h-full bg-primary-500 transform -translate-x-full group-hover:translate-x-0 transition-transform duration-300">
                        </div>

                        <div class="flex items-start justify-between mb-3 pl-1">
                            <div class="flex flex-col flex-grow min-w-0 pr-2">
                                <h3
                                    class="text-gray-900 font-bold text-sm sm:text-base group-hover:text-primary-600 transition-colors truncate">
                                    {{data.key}}
                                </h3>
                                <span class="text-gray-400 text-[10px] sm:text-xs font-mono truncate">
                                    {{data.displayValue}}
                                </span>
                            </div>
                            <div
                                class="flex-shrink-0 p-2 bg-primary-50 rounded-lg group-hover:bg-primary-600 transition-colors">
                                <mat-icon
                                    class="text-primary-500 group-hover:text-white !text-lg !h-[18px] !w-[18px]">launch</mat-icon>
                            </div>
                        </div>

                        <div class="text-gray-500 text-sm leading-relaxed line-clamp-2 pl-1">
                            {{data.description || 'Access system resource or external documentation.'}}
                        </div>

                        <!-- Hover glow effect -->
                        <div
                            class="absolute inset-0 pointer-events-none bg-gradient-to-br from-primary-50/0 to-primary-50/50 opacity-0 group-hover:opacity-100 transition-opacity">
                        </div>
                    </a>
                </div>

                <!-- Empty State -->
                <div *ngIf="appLinks.length === 0"
                    class="flex flex-col items-center justify-center py-12 text-gray-400">
                    <mat-icon class="!text-5xl !h-12 !w-12 mb-2 opacity-20">link_off</mat-icon>
                    <p class="text-sm">No resources available at this time.</p>
                </div>
            </div>
        </mat-expansion-panel>
    </mat-accordion>

    <mat-tab-group mat-stretch-tabs="false" mat-align-tabs="center" class="mat-tab-group-mobile-scroll"
        (selectedTabChange)="tabChanged($event.index)" [(selectedIndex)]="tabIndex">
        <mat-tab id="apiKey" label="API keys">
            <app-admin-apikey-tab [accordionData]="initialData" [refData]="refData"></app-admin-apikey-tab>
        </mat-tab>
        <mat-tab id="oauthToken" label="OAuth Tokens">
            <app-admin-oauth-tab [accordionData]="initialData" [refData]="refData"></app-admin-oauth-tab>
        </mat-tab>
        <mat-tab id="tasks" label="Automatic Tasks">
            <app-admin-tasks-tab [accordionData]="initialData" [refData]="refData"></app-admin-tasks-tab>
        </mat-tab>
        <mat-tab id="backgroundJobs" label="Background Jobs">
            <app-admin-bg-jobs-tab [accordionData]="initialData" [refData]="refData"></app-admin-bg-jobs-tab>
        </mat-tab>

        <mat-tab id="cronjobs" label="Cron Triggers">
            <app-admin-cron-trigger-tab [accordionData]="initialData" [refData]="refData"></app-admin-cron-trigger-tab>
        </mat-tab>
        <!-- <mat-tab id="fcmTokens" label="FCM Tokens">
            <app-admin-fcm-token-tab [accordionData]="initialData" [refData]="refData"></app-admin-fcm-token-tab>
        </mat-tab> -->
        <mat-tab id="notificationLogs" label="Notifications">
            <app-admin-notifications-tab [accordionData]="initialData"
                [refData]="refData"></app-admin-notifications-tab>
        </mat-tab>
    </mat-tab-group>
    <app-page-navigation-buttons [navigations]="navigations"></app-page-navigation-buttons>
</main>
